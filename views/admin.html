<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Course Hub</title>
    <link rel="stylesheet" href="/styles.css">
    
</head>
<body>
    <main>
        <h1>Admin Dashboard</h1>
        
        <div class="admin-section">
            <h2>Add New Programme</h2>
            <form id="add-programme-form">
                <input type="text" id="prog-title" placeholder="Programme Title" required>
                <select id="prog-level">
                    <option value="Undergraduate">Undergraduate</option>
                    <option value="Postgraduate">Postgraduate</option>
                </select>
                <input type="text" id="prog-desc" placeholder="Brief Description" required style="width: 100%;">
                <button type="submit">Create Programme</button>
            </form>
        </div>

        <div class="admin-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Manage Programmes</h2>
                <button id="export-btn" style="background: #17a2b8; font-weight: bold;">
                    Download Mailing List (CSV)
                </button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Level</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-programmes-list">
                    </tbody>
            </table>
        </div>
    <script src="/admin.js"></script>
</body>
</html>
