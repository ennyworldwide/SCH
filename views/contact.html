    <main>
        <h1>Contact Us</h1>
        <p>Have questions? Send us a message and our support team will get back to you.</p>
        <form onsubmit="alert('Message sent! (Mock functionality)'); event.preventDefault();">
            <label>Name</label>
            <input type="text" required>
            <label>Email</label>
            <input type="email" required>
            <label>Message</label>
            <textarea rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </main>
