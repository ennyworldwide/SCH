<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Hub</title>
    <style>
        body { font-family: system-ui, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background: #f4f4f9; }
        main { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        input[type="search"], select { padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        .programme-card { border: 2px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 6px; transition: border-color 0.2s; }
        .programme-card:focus-within { border-color: #0056b3; outline: none; }
        .badge { display: inline-block; background: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; }
        .modules-list { margin-top: 15px; padding: 15px; background: #f8f9fa; border-left: 4px solid #0056b3; }
        
        /* Form Styles */
        form { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; padding: 20px; background: #eef2f5; border-radius: 6px; }
        input[type="text"], input[type="email"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #0056b3; color: white; border: none; padding: 10px 15px; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: background 0.2s; }
        button:hover { background: #004494; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-outline { background: transparent; color: #0056b3; border: 2px solid #0056b3; }
        .btn-outline:hover { background: #0056b3; color: white; }

        /* UI Polish: Spinners and Toasts */
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #0056b3; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .toast { padding: 15px 20px; border-radius: 4px; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; opacity: 1; transition: opacity 0.5s ease; }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <main>
        <h1>Discover Your Future</h1>
        <p>Explore our available undergraduate and postgraduate degree programmes.</p>
        
        <div class="controls">
            <input type="search" id="search-input" placeholder="Search by keyword (e.g., Cyber Security)..." aria-label="Search programmes">
            <select id="level-filter" aria-label="Filter by study level">
                <option value="All">All Levels</option>
                <option value="Undergraduate">Undergraduate</option>
                <option value="Postgraduate">Postgraduate</option>
            </select>
        </div>

        <div id="programmes-container" aria-live="polite">
            <div class="spinner"></div>
        </div>
    </main>

    <div id="toast-container" aria-live="polite"></div>

    <script src="/app.js"></script>
</body>
</html>
