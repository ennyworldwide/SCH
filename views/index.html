<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Student Course Hub</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* Extra styles specific to the homepage hero section */
        .hero { text-align: center; padding: 40px 20px; background: white; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .hero h1 { margin-top: 0; color: #333; }
        .auth-group { display: flex; gap: 10px; align-items: center; }
        .btn-nav-outline { border: 1px solid white; color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none; }
        .btn-nav-outline:hover { background: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/">Home</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact Us</a>
        </div>
        <div class="auth-group">
            <a href="/login.html" class="btn-nav-outline">Student Login</a>
            <a href="/login.html" class="login-btn">Admin Login</a>
        </div>
    </nav>

    <main style="background: transparent; box-shadow: none; padding: 0;">
        
        <div class="hero">
            <h1>Discover Your Future</h1>
            <p>Explore our available degree programmes and register as a new student today.</p>
            <button onclick="document.getElementById('search-input').focus()">Browse & Register Below</button>
        </div>

        <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div class="controls">
                <input type="search" id="search-input" placeholder="Search by keyword (e.g., Cyber Security)..." aria-label="Search programmes">
                <select id="level-filter" aria-label="Filter by study level">
                    <option value="All">All Levels</option>
                    <option value="Undergraduate">Undergraduate</option>
                    <option value="Postgraduate">Postgraduate</option>
                </select>
            </div>

            <div id="programmes-container" aria-live="polite">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <div id="toast-container" aria-live="polite"></div>

    <script src="/app.js"></script>
</body>
</html>
