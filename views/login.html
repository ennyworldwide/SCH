<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Course Hub</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 320px; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #0056b3; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        #error-msg { color: #dc3545; font-size: 0.9rem; display: none; background: #f8d7da; padding: 10px; border-radius: 4px; border: 1px solid #f5c6cb; margin-bottom: 15px;}
        .hint { font-size: 0.85rem; color: #666; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="/" class="back-link">&larr; Back to Home</a>
        
        <h2 style="margin-top: 0;">Portal Login</h2>
        <p id="error-msg">Invalid credentials. Try again.</p>
        
        <form id="login-form" style="background: transparent; padding: 0; margin-top: 0; box-shadow: none;">
            <input type="text" id="username" placeholder="Username (student or lecturer)" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" style="margin-top: 10px;">Sign In</button>
        </form>
        
        <div class="hint">
            <strong>Demo Accounts:</strong><br>
            Student: <em>student / student123</em><br>
            Admin: <em>lecturer / staff123</em>
        </div>
    </div>

    <script src="/login.js"></script>
</body>
</html>
