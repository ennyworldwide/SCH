<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Course Hub</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #eef2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, button { padding: 10px; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #333; color: white; cursor: pointer; border: none; }
        button:hover { background: #000; }
        #error-msg { color: red; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        <p id="error-msg">Invalid credentials. Try again.</p>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <script src="/login.js"></script>
</body>
</html>
